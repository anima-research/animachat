name: Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'deprecated-claude-app/**'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          cache: 'npm'
          cache-dependency-path: deprecated-claude-app/package-lock.json

      - name: Install dependencies
        working-directory: deprecated-claude-app
        run: npm ci

      - name: Build shared
        working-directory: deprecated-claude-app
        run: npm run build -w shared

      - name: Run backend tests with coverage
        working-directory: deprecated-claude-app/backend
        run: npx vitest run --coverage --coverage.include='src/**/*.{ts,tsx,js,jsx}' --coverage.reporter=text --coverage.reporter=json-summary

      - name: Run frontend tests with coverage
        working-directory: deprecated-claude-app/frontend
        run: npx vitest run --coverage --coverage.include='src/**/*.{ts,tsx,js,jsx}' --coverage.reporter=text --coverage.reporter=json-summary

      - name: Run shared tests
        working-directory: deprecated-claude-app
        run: npm test -w shared

      - name: Post coverage summary
        if: always()
        working-directory: deprecated-claude-app
        run: |
          echo "## Test Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Track whether any workspace falls below threshold so we can
          # fail the job at the end. (Greptile #112 catch: previously this
          # step computed pass/warn but never used it to set an exit code,
          # so coverage could silently fall to 0% with a green CI.)
          OVERALL_STATUS="pass"

          for workspace in backend frontend; do
            SUMMARY="$workspace/coverage/coverage-summary.json"
            if [ -f "$SUMMARY" ]; then
              STMTS=$(node -e "const d=require('./$SUMMARY').total.statements.pct; process.stdout.write(String(d))")
              BRANCH=$(node -e "const d=require('./$SUMMARY').total.branches.pct; process.stdout.write(String(d))")
              FUNCS=$(node -e "const d=require('./$SUMMARY').total.functions.pct; process.stdout.write(String(d))")
              LINES=$(node -e "const d=require('./$SUMMARY').total.lines.pct; process.stdout.write(String(d))")

              if [ "$(node -e "process.stdout.write(($STMTS >= 75 && $BRANCH >= 75) ? 'pass' : 'fail')")" = "pass" ]; then
                STATUS="pass"
              else
                STATUS="fail"
                OVERALL_STATUS="fail"
              fi

              echo "### $workspace ($STATUS)" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "| Metric | Coverage | Target |" >> "$GITHUB_STEP_SUMMARY"
              echo "|--------|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
              echo "| Statements | ${STMTS}% | 75% |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Branches | ${BRANCH}% | 75% |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Functions | ${FUNCS}% | — |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Lines | ${LINES}% | — |" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "### $workspace" >> "$GITHUB_STEP_SUMMARY"
              echo "No coverage data found." >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              # Missing coverage data is itself a failure — we ran the step,
              # so either the test job collapsed or the path is wrong.
              OVERALL_STATUS="fail"
            fi
          done

          # Fail the job if any workspace dropped below threshold or had
          # no coverage data. The job-summary tables still render either
          # way (this `run` step is the LAST step in the job).
          if [ "$OVERALL_STATUS" != "pass" ]; then
            echo "❌ Coverage threshold not met (75% statements + 75% branches per workspace)." >&2
            exit 1
          fi
